name: Perf Check

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  bench-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build Codex.sln --configuration Release

      - name: Run perf regression check
        run: dotnet run --project tools/Codex.Bootstrap --configuration Release -- --bench-check
